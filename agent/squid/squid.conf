http_port 3128
visible_hostname agent-squid
pid_filename /run/squid/squid.pid

# Restrict traffic to common web ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 10555
acl CONNECT method CONNECT

# Explicit allowlists for destinations.
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"
acl allowed_ips dst "/etc/squid/allowed-ips.txt"

# Accept clients only from private Docker ranges.
acl agent_clients src 10.0.0.0/8
acl agent_clients src 172.16.0.0/12
acl agent_clients src 192.168.0.0/16

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

http_access allow agent_clients allowed_domains
http_access allow agent_clients allowed_ips
http_access deny all

# Proxy-only mode; no local content cache.
cache deny all
cache_dir null /tmp
access_log stdio:/var/log/squid/access.log
